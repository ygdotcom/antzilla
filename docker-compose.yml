services:
  # ── Caddy reverse proxy (HTTPS for everything) ──
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
      - "8444:8444"
      - "3002:3002"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - hatchet-dashboard
      - plausible
      - uptime-kuma

  # ── Postgres with pgvector (shared: factory DB + hatchet DB + plausible DB) ──
  postgres:
    image: pgvector/pgvector:pg16
    command: postgres -c 'max_connections=200'
    restart: always
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: factory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Hatchet: migration ──
  hatchet-migration:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-migrate:latest
    command: /hatchet/hatchet-migrate
    environment:
      DATABASE_URL: postgres://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hatchet
    depends_on:
      postgres:
        condition: service_healthy

  # ── Hatchet: config generation (creates API tokens, keys) ──
  hatchet-setup:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-admin:latest
    command: /hatchet/hatchet-admin quickstart --skip certs --generated-config-dir /hatchet/config --overwrite=false
    environment:
      DATABASE_URL: postgres://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hatchet
      SERVER_MSGQUEUE_KIND: postgres
      SERVER_AUTH_COOKIE_DOMAIN: localhost:8080
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet-engine:7070
    volumes:
      - hatchet_config:/hatchet/config
      - hatchet_certs:/hatchet/certs
    depends_on:
      hatchet-migration:
        condition: service_completed_successfully

  # ── Hatchet Engine (gRPC for workers) ──
  hatchet-engine:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:latest
    command: /hatchet/hatchet-engine --config /hatchet/config
    restart: on-failure
    depends_on:
      hatchet-setup:
        condition: service_completed_successfully
    ports:
      - "7070:7070"
    environment:
      DATABASE_URL: postgres://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hatchet
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
    volumes:
      - hatchet_config:/hatchet/config
      - hatchet_certs:/hatchet/certs

  # ── Hatchet Dashboard (internal only — accessed via Caddy :8443) ──
  hatchet-dashboard:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-dashboard:latest
    command: sh ./entrypoint.sh --config /hatchet/config
    restart: on-failure
    depends_on:
      hatchet-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hatchet
    volumes:
      - hatchet_config:/hatchet/config
      - hatchet_certs:/hatchet/certs

  # ── Factory Worker (Python agents) ──
  factory-worker:
    build: .
    restart: on-failure
    depends_on:
      hatchet-engine:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/factory
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      HATCHET_CLIENT_TLS_STRATEGY: none
    volumes:
      - hatchet_config:/hatchet/config
      - ./src:/app/src
      - ./prompts:/app/prompts

  # ── CEO Dashboard (internal only — accessed via Caddy :443) ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/factory
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./src:/app/src

  # ── Plausible Analytics (internal only — accessed via Caddy :8444) ──
  plausible-events-db:
    image: clickhouse/clickhouse-server:24-alpine
    restart: always
    volumes:
      - plausible_events_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      plausible-events-db:
        condition: service_started
    environment:
      DATABASE_URL: postgres://factory:${POSTGRES_PASSWORD:-changeme}@postgres:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events
      BASE_URL: ${PLAUSIBLE_BASE_URL:-http://localhost:8000}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET:-generate_me_with_openssl_rand_base64_64}

  # ── Uptime Kuma (internal only — accessed via Caddy :3002) ──
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: always
    volumes:
      - uptime_kuma_data:/app/data

volumes:
  postgres_data:
  plausible_events_data:
  uptime_kuma_data:
  hatchet_config:
  hatchet_certs:
  caddy_data:
  caddy_config:
