<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antzilla — Sign in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
      background-size: 400% 400%;
      animation: gradient-shift 12s ease infinite;
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    input:focus {
      outline: none;
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
    }
  </style>
</head>
<body class="bg-black font-sans antialiased">
  <div class="flex min-h-screen">

    <!-- Left: Login form -->
    <div class="flex flex-col justify-center w-full lg:w-[480px] px-8 lg:px-16">
      <div class="max-w-sm mx-auto w-full">

        <!-- Logo -->
        <div class="mb-10">
          <div class="flex items-center gap-2.5 mb-1">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center">
              <svg class="w-4.5 h-4.5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
              </svg>
            </div>
            <span class="text-white font-semibold text-xl tracking-tight">Antzilla</span>
          </div>
        </div>

        <!-- Title -->
        <h1 class="text-white text-3xl font-semibold mb-2">Sign in</h1>
        <p class="text-zinc-400 text-[15px] mb-8">Access the autonomous business factory.</p>

        <!-- Error message -->
        {% if error %}
        <div class="mb-6 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
          {{ error }}
        </div>
        {% endif %}

        <!-- Login form -->
        <form method="POST" action="/login" class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-medium text-zinc-300 mb-1.5">Email</label>
            <input
              type="email"
              id="username"
              name="username"
              autocomplete="email"
              required
              class="w-full px-3.5 py-2.5 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-sm placeholder-zinc-500 transition-all duration-200"
              placeholder="you@company.com"
            >
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">Password</label>
            <div class="relative">
              <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                required
                class="w-full px-3.5 py-2.5 rounded-lg bg-zinc-900 border border-zinc-700 text-white text-sm placeholder-zinc-500 transition-all duration-200"
                placeholder="Enter your password"
              >
              <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 transition-colors">
                <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="w-full py-2.5 px-4 rounded-lg bg-white text-black text-sm font-semibold hover:bg-zinc-200 transition-colors duration-200 mt-2"
          >
            Continue
          </button>
        </form>

        <!-- Footer -->
        <div class="mt-10 pt-6 border-t border-zinc-800">
          <p class="text-zinc-500 text-xs text-center">
            Secured by Supabase Auth.
          </p>
        </div>
      </div>
    </div>

    <!-- Right: Gradient panel -->
    <div class="hidden lg:flex flex-1 gradient-bg items-center justify-center relative overflow-hidden">
      <!-- Floating glass card -->
      <div class="glass-card rounded-2xl px-8 py-6 max-w-md mx-8 shadow-2xl">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
            <svg class="w-5 h-5 text-white/80" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/>
            </svg>
          </div>
          <div>
            <p class="text-white/90 font-medium text-sm">Autonomous Business Engine</p>
            <p class="text-white/50 text-xs">32 agents · 378 tests</p>
          </div>
        </div>
        <p class="text-white/70 text-sm leading-relaxed">
          Discovers ideas, validates with ads, builds MVPs, sells via cold email + AI voice, operates — all autonomously.
        </p>
      </div>

      <!-- Decorative blurred circles -->
      <div class="absolute top-20 left-20 w-72 h-72 bg-white/5 rounded-full blur-3xl"></div>
      <div class="absolute bottom-32 right-16 w-56 h-56 bg-white/5 rounded-full blur-3xl"></div>
    </div>

  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
