{% extends "base.html" %}

{% block title %}Console{% endblock %}

{% block content %}
<div class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-semibold text-white">Live Console</h2>
      <p class="text-zinc-400 text-sm mt-1">Real-time factory activity. Auto-refreshes every 5 seconds.</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-brand animate-pulse"></div>
        <span class="text-zinc-400 text-sm">Live</span>
      </div>
      <button onclick="document.getElementById('feed').innerHTML=''; htmx.trigger('#feed','load')" class="px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-sm text-zinc-300 transition-colors">
        Clear
      </button>
    </div>
  </div>

  <div class="bg-zinc-900 rounded-xl border border-zinc-800 overflow-hidden">
    <!-- Header -->
    <div class="flex items-center gap-3 px-4 py-2 border-b border-zinc-800 bg-zinc-950">
      <span class="text-zinc-500 text-xs w-44 shrink-0">Time</span>
      <span class="text-zinc-500 text-xs w-12">Status</span>
      <span class="text-zinc-500 text-xs">Agent</span>
      <span class="text-zinc-500 text-xs">Action</span>
    </div>

    <!-- Feed — auto-refreshes every 5 seconds -->
    <div id="feed"
         hx-get="/console/feed"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML"
         class="max-h-[70vh] overflow-y-auto font-mono">
      <div class="px-4 py-8 text-center text-zinc-500">Loading...</div>
    </div>
  </div>
</div>
{% endblock %}
